<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const GROQ_STT = "https://api.groq.com/openai/v1/audio/transcriptions";
const GEMINI_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro-preview:generateContent";

const SPEAK_THR=22, SPEAK_FRAMES=8, SILENCE_THR=14, SILENCE_FRAMES=90;
const INT_THR=25, INT_FRAMES=15, CHECK_MS=16;
const SILENT_WAV = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA";

// VOICEVOX人気キャラクター
const SPEAKERS = [
  {id:2,  name:"四国めたん（ノーマル）"},
  {id:3,  name:"ずんだもん（ノーマル）"},
  {id:8,  name:"春日部つむぎ"},
  {id:10, name:"雨晴はう"},
  {id:14, name:"冥鳴ひまり"},
  {id:20, name:"もち子さん"},
  {id:23, name:"WhiteCUL（ノーマル）"},
  {id:27, name:"青山龍星"},
  {id:29, name:"No.7"},
  {id:42, name:"ちび式じい"},
  {id:43, name:"櫻歌ミコ"},
  {id:52, name:"雀松朱司"},
];

const css = `
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0}

.setup{flex:1;display:flex;flex-direction:column;gap:16px;padding:20px 18px;overflow-y:auto}

.field{display:flex;flex-direction:column;gap:5px}

.inp{background:rgba(168,85,247,.06);border:1px solid rgba(168,85,247,.2);border-radius:10px;padding:11px 13px;color:#e2e8f0;font-size:.86rem;width:100%;outline:none}
.inp:focus{border-color:rgba(168,85,247,.55)}

.hint a{color:#818cf8;text-decoration:none}

.btn-go:active{transform:scale(.98);opacity:.85}
.err-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.22);border-radius:8px;padding:9px 13px;font-size:.78rem;color:#f87171;line-height:1.5}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

.pr{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .4s}
.pr.waiting{background:rgba(55,65,81,.4);border:3px solid rgba(55,65,81,.6)}
.pr.recording{background:rgba(239,68,68,.15);border:3px solid #ef4444;animation:pr 1.4s infinite}
.pr.processing{background:rgba(251,191,36,.1);border:3px solid rgba(251,191,36,.5)}
.pr.speaking{background:rgba(129,140,248,.12);border:3px solid rgba(129,140,248,.6);animation:ps 2s infinite}
.pr.interrupted{background:rgba(239,68,68,.2);border:3px solid #ef4444}
@keyframes pr{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 20px rgba(239,68,68,0)}}
@keyframes ps{0%,100%{box-shadow:0 0 0 0 rgba(129,140,248,.35)}50%{box-shadow:0 0 0 22px rgba(129,140,248,0)}}
.pi{font-size:2.8rem}
.st{font-family:'Share Tech Mono',monospace;font-size:.86rem;text-align:center;line-height:1.7;white-space:pre-line}
.st.waiting{color:#4b5563}.st.recording{color:#f87171;animation:bl 1s infinite}.st.processing{color:#fbbf24}.st.speaking{color:#818cf8}.st.interrupted{color:#f87171}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.5}}
.badges{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.badge{font-family:'Share Tech Mono',monospace;font-size:.6rem;padding:3px 8px;border-radius:20px}
.badge.ok{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3);color:#34d399}
.badge.off{background:rgba(55,65,81,.3);border:1px solid rgba(55,65,81,.5);color:#4b5563}
.badge.warn{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:#fbbf24}
.vw{width:220px}.vt{height:6px;background:rgba(255,255,255,.06);border-radius:3px;position:relative}
.vf{height:100%;border-radius:3px;transition:width .08s,background .2s;position:absolute;left:0;top:0}
.vh{position:absolute;top:-3px;height:12px;width:2px;border-radius:1px;background:rgba(248,113,113,.7)}
.vl{display:flex;justify-content:space-between;margin-top:4px}
.vlb{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:#374151}
.chat{flex:1;overflow-y:auto;padding:0 16px 10px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.row{display:flex;flex-direction:column;gap:3px}
.rl{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:#2d3748;padding:0 2px}
.bb{max-width:86%;padding:9px 13px;border-radius:14px;font-size:.88rem;line-height:1.7;word-break:break-word;white-space:pre-wrap}
.bb.user{align-self:flex-end;background:rgba(124,58,237,.2);border:1px solid rgba(168,85,247,.25);border-bottom-right-radius:3px;color:#ddd6fe}
.bb.ai{align-self:flex-start;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-bottom-left-radius:3px;color:#e2e8f0}
.bb.ai.now{border-color:rgba(129,140,248,.5);background:rgba(129,140,248,.07);animation:gb 2s infinite}
.bb.ai.cut{border-color:rgba(248,113,113,.25);background:rgba(248,113,113,.04)}
@keyframes gb{0%,100%{border-color:rgba(129,140,248,.4)}50%{border-color:rgba(129,140,248,.8)}}
.cl{font-size:.62rem;font-family:'Share Tech Mono',monospace;color:#f87171;opacity:.65;padding:0 3px}
.th{display:flex;gap:5px;align-items:center;padding:2px 0}
.td{width:6px;height:6px;border-radius:50%;background:#6b7280;animation:bn .8s infinite}
.td:nth-child(2){animation-delay:.15s}.td:nth-child(3){animation-delay:.3s}
@keyframes bn{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.bot{padding:8px 18px 14px;border-top:1px solid rgba(168,85,247,.1);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.sr{display:flex;align-items:center;gap:8px}
.sl{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:#374151;white-space:nowrap}
.ss{flex:1;accent-color:#a78bfa}
.br{display:flex;gap:8px;justify-content:center}
.bs{padding:7px 14px;border:1px solid rgba(168,85,247,.2);border-radius:8px;background:transparent;color:#818cf8;font-size:.7rem;font-family:'Share Tech Mono',monospace;cursor:pointer}
.bs:active{background:rgba(168,85,247,.1)}
.bs.red{color:#f87171;border-color:rgba(248,113,113,.2)}
.bs.yel{color:#fbbf24;border-color:rgba(251,191,36,.2)}
.ov{position:fixed;inset:0;background:#06090f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:32px;z-index:100}
.oi{font-size:3rem;opacity:.7}
.ot{font-size:1.1rem;font-weight:700;color:#c084fc;text-align:center}
.od{font-size:.83rem;color:#6b7280;text-align:center;line-height:1.8}
.ob{padding:16px 36px;background:linear-gradient(135deg,#7c3aed,#6d28d9);border:none;border-radius:14px;color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer}
select.inp{appearance:auto}
`;

const ICONS={waiting:"🎧",recording:"🔴",processing:"⚡",speaking:"🔊",interrupted:"⚡"};
const STXT={waiting:"声を出すと\n自動で録音が始まります",recording:"録音中\n（黙ると自動送信）",processing:"Gemini 3.1 Pro\n思考中...",speaking:"再生中\n（声で割り込み可）",interrupted:"割り込み検知\n録音中..."};

// VOICEVOX TTS
async function voicevoxTTS(text, baseUrl, speaker, speed=1.0) {
  const q = await fetch(`${baseUrl}/audio_query?text=${encodeURIComponent(text)}&speaker=${speaker}`, {method:"POST"});
  if(!q.ok) throw new Error(`audio_query: ${q.status}`);
  const query = await q.json();
  query.speedScale = speed;
  const s = await fetch(`${baseUrl}/synthesis?speaker=${speaker}`, {
    method:"POST",
    headers:{"Content-Type":"application/json", "Accept":"audio/wav"},
    body: JSON.stringify(query)
  });
  if(!s.ok) throw new Error(`synthesis: ${s.status}`);
  return await s.blob();
}

function App() {
  const [cfg,setCfg]=useState(()=>{try{return JSON.parse(localStorage.getItem("hf_vc9")||"null")}catch{return null}});
  const [form,setForm]=useState({
    groq:"",
    gemini:"",
    voicevox:"https://desktop-jmhh5uq.tail12e509.ts.net",
    speaker:3,
    speed:1.3,
    sys:"あなたは親切で会話好きな日本語AIアシスタントです。簡潔に話し言葉で自然な会話をしてください。必ず100文字以内で答えてください。"
  });
  const [started,setStarted]=useState(false);
  const [mode,setMode]=useState("waiting");
  const [msgs,setMsgs]=useState([]);
  const [err,setErr]=useState("");
  const [vol,setVol]=useState(0);
  const [sens,setSens]=useState(INT_THR);
  const [wl,setWl]=useState(false);
  const [silOk,setSilOk]=useState(false);
  const [bgV,setBgV]=useState(true);
  const [ttsT,setTtsT]=useState("");

  const mr=useRef("waiting"),cr=useRef(null),sr2=useRef(INT_THR);
  const hr=useRef([]),vr=useRef(null),rr=useRef(null),ch=useRef([]),er=useRef(null);
  const wlr=useRef(null),slr=useRef(null),ar=useRef(null),utr=useRef(null);

  useEffect(()=>{mr.current=mode},[mode]);
  useEffect(()=>{cr.current=cfg},[cfg]);
  useEffect(()=>{sr2.current=sens},[sens]);
  useEffect(()=>{er.current?.scrollIntoView({behavior:"smooth"})},[msgs]);

  const sm=(m)=>{setMode(m);mr.current=m;};
  const rwl=useCallback(async()=>{try{if(!("wakeLock" in navigator))return;const s=await navigator.wakeLock.request("screen");wlr.current=s;setWl(true);s.addEventListener("release",()=>{setWl(false);wlr.current=null;});}catch(e){}},[]);
  const ssl=useCallback(()=>{if(slr.current)return;const a=new Audio(SILENT_WAV);a.loop=true;a.volume=0.001;a.play().then(()=>{slr.current=a;setSilOk(true);}).catch(()=>{});},[]);
  useEffect(()=>{if(!started)return;const fn=async()=>{const v=document.visibilityState==="visible";setBgV(v);if(v){if(!wlr.current)await rwl();if(slr.current?.paused)slr.current.play().catch(()=>{});}};document.addEventListener("visibilitychange",fn);return()=>document.removeEventListener("visibilitychange",fn);},[started,rwl]);
  useEffect(()=>{speechSynthesis.getVoices();},[]);

  function saveConfig(){
    const asciiOnly=(s)=>s.replace(/[^\x00-\x7F]/g,"").trim();
    const groq=asciiOnly(form.groq);
    const gemini=asciiOnly(form.gemini);
    if(!groq){setErr("Groq APIキーを入力");return;}
    if(!gemini){setErr("Gemini APIキーを入力");return;}
    const c={
      groq, gemini,
      voicevox: form.voicevox.trim().replace(/\/$/,""),
      speaker: Number(form.speaker) || 3,
      speed: Number(form.speed) || 1.3,
      sys: form.sys.trim()
    };
    localStorage.setItem("hf_vc9",JSON.stringify(c));setCfg(c);cr.current=c;setErr("");
  }

  const startVAD=useCallback(async()=>{
    if(vr.current)return;
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const src=ctx.createMediaStreamSource(stream);
    const an=ctx.createAnalyser();an.fftSize=512;src.connect(an);
    const data=new Uint8Array(an.frequencyBinCount);
    const opts=MediaRecorder.isTypeSupported("audio/webm;codecs=opus")?{mimeType:"audio/webm;codecs=opus"}:MediaRecorder.isTypeSupported("audio/webm")?{mimeType:"audio/webm"}:{};
    const rec=new MediaRecorder(stream,opts);rr.current=rec;
    rec.ondataavailable=e=>{if(e.data.size>0)ch.current.push(e.data);};
    rec.onstop=()=>runPipe(rec.mimeType||"audio/webm");
    let sc=0,sic=0,ic=0,lt=0,isR=false;
    const loop=(ts)=>{
      if(ts-lt<CHECK_MS){vr.current.raf=requestAnimationFrame(loop);return;}
      lt=ts;an.getByteFrequencyData(data);
      const avg=data.reduce((a,b)=>a+b,0)/data.length;setVol(avg);
      const m=mr.current;
      if(m==="speaking"){if(avg>sr2.current){ic++;if(ic>=INT_FRAMES){ic=0;doInt();}}else ic=0;sc=0;sic=0;}
      else if(m==="waiting"){ic=0;if(avg>SPEAK_THR){sc++;if(sc>=SPEAK_FRAMES&&!isR){isR=true;sic=0;ch.current=[];rec.start(100);sm("recording");}}else sc=0;}
      else if(m==="recording"){ic=0;if(avg<SILENCE_THR){sic++;if(sic>=SILENCE_FRAMES){sic=0;sc=0;isR=false;rec.stop();sm("processing");}}else sic=0;}
      else{sc=0;sic=0;ic=0;}
      vr.current.raf=requestAnimationFrame(loop);
    };
    vr.current={ctx,stream,an,raf:requestAnimationFrame(loop)};
  },[]);

  const doInt=useCallback(()=>{
    if(mr.current!=="speaking")return;
    if(ar.current){ar.current.pause();ar.current.onended=null;ar.current=null;}
    window.speechSynthesis.cancel();
    utr.current=null;
    setMsgs(m=>m.map(x=>x.now?{...x,now:false,cut:true}:x));
    sm("interrupted");
    setTimeout(()=>{ch.current=[];if(rr.current?.state==="inactive"){rr.current.start(100);sm("recording");}},350);
  },[]);

  const runPipe=useCallback(async(mime)=>{
    const c=cr.current;if(!c)return;
    try{
      const ext=mime.includes("mp4")?"mp4":mime.includes("ogg")?"ogg":"webm";
      const blob=new Blob(ch.current,{type:mime});
      if(blob.size<1000){sm("waiting");return;}
      const fd=new FormData();fd.append("file",blob,`r.${ext}`);
      fd.append("model","whisper-large-v3-turbo");fd.append("language","ja");fd.append("response_format","text");
      const r1=await fetch(GROQ_STT,{method:"POST",headers:{Authorization:`Bearer ${c.groq}`},body:fd});
      if(!r1.ok)throw new Error(`STT: ${r1.status}`);
      const ut=(await r1.text()).trim();
      if(!ut||ut.length<2){sm("waiting");return;}
      setMsgs(m=>[...m,{role:"user",text:ut}]);
      setMsgs(m=>[...m,{role:"ai",text:"",thinking:true}]);
      hr.current.push({role:"user",parts:[{text:ut}]});
      const r2=await fetch(`${GEMINI_URL}?key=${c.gemini}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system_instruction:{parts:[{text:c.sys}]},contents:hr.current})});
      if(!r2.ok){const j=await r2.json().catch(()=>({}));throw new Error(`Gemini: ${j.error?.message||r2.status}`);}
      const g=await r2.json();
      const at=g.candidates?.[0]?.content?.parts?.[0]?.text||"（返答なし）";
      hr.current.push({role:"model",parts:[{text:at}]});
      setMsgs(m=>{const cp=[...m];cp[cp.length-1]={...cp[cp.length-1],text:at,thinking:false,now:true};return cp;});
      sm("speaking");

      const onEnd=()=>{ar.current=null;utr.current=null;setMsgs(m=>m.map(x=>x.now?{...x,now:false}:x));sm("waiting");};

      // VOICEVOX を試す
      let useBrowser=false;
      if(c.voicevox){
        try{
          const blob = await voicevoxTTS(at, c.voicevox, c.speaker, c.speed);
          const url = URL.createObjectURL(blob);
          const audio = new Audio(url);
          ar.current = audio;
          audio.onended=()=>{URL.revokeObjectURL(url);onEnd();};
          audio.onerror=()=>{URL.revokeObjectURL(url);setTtsT("browser");doBrowserTTS(at,onEnd);};
          await audio.play();
          setTtsT("voicevox");
        }catch(e){
          console.warn("VOICEVOX失敗→ブラウザTTS:", e.message);
          useBrowser=true;
        }
      }else{
        useBrowser=true;
      }

      if(useBrowser){
        setTtsT("browser");
        doBrowserTTS(at,onEnd);
      }
      setErr("");
    }catch(e){setErr(e.message);setMsgs(m=>m[m.length-1]?.thinking?m.slice(0,-1):m);sm("waiting");}
  },[]);

  const doBrowserTTS=(text,onEnd)=>{
    const synth=window.speechSynthesis;synth.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="ja-JP"; u.rate=1.1; u.pitch=1.05;
    const vs=synth.getVoices();
    const jp=vs.find(x=>x.lang.startsWith("ja")&&x.name.toLowerCase().includes("female"))||vs.find(x=>x.lang.startsWith("ja"))||vs[0];
    if(jp)u.voice=jp;
    u.onend=onEnd; u.onerror=onEnd;
    utr.current=u;
    synth.speak(u);
  };

  const handleStart=useCallback(async()=>{
    try{const sy=window.speechSynthesis;sy.cancel();const d=new SpeechSynthesisUtterance("");d.volume=0;sy.speak(d);await startVAD();await rwl();ssl();setStarted(true);sm("waiting");}
    catch(e){setErr("マイクへのアクセスが拒否されました");}
  },[startVAD,rwl,ssl]);

  const vp=Math.min(100,(vol/255)*100),tp=Math.min(100,(sens/255)*100);

  if(!cfg) return(<><style>{css}</style><div className="app"><div className="setup">
    <div style={{textAlign:"center",padding:"8px 0 4px"}}><div style={{fontSize:"2rem",marginBottom:8}}>🎙</div>
    <div className="setup-hd">ハンズフリー音声会話</div>
    <div style={{fontSize:".75rem",color:"#4b5563",marginTop:4}}>VOICEVOX対応版</div></div>
    <div className="field"><div className="lbl">Groq API Key（音声認識・無料）</div>
    <input className="inp" type="password" placeholder="gsk_..." value={form.groq} onChange={e=>setForm(f=>({...f,groq:e.target.value}))}/>
    <div className="hint"><a href="https://console.groq.com" target="_blank">console.groq.com</a> で無料取得</div></div>
    <div className="field"><div className="lbl">Gemini API Key（AI返答）</div>
    <input className="inp" type="password" placeholder="AIza..." value={form.gemini} onChange={e=>setForm(f=>({...f,gemini:e.target.value}))}/>
    <div className="hint"><a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a> → Get API key</div></div>
    <div className="field"><div className="lbl">VOICEVOX URL（空欄でブラウザ音声）</div>
    <input className="inp" type="text" placeholder="https://xxx.hf.space" value={form.voicevox} onChange={e=>setForm(f=>({...f,voicevox:e.target.value}))}/></div>
    <div className="field"><div className="lbl">VOICEVOXキャラクター</div>
    <select className="inp" value={form.speaker} onChange={e=>setForm(f=>({...f,speaker:e.target.value}))}>
      {SPEAKERS.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
    </select></div>
    <div className="field"><div className="lbl">話す速さ（{Number(form.speed).toFixed(2)}倍速）</div>
    <input className="inp" type="range" min="0.5" max="2.0" step="0.05" value={form.speed} onChange={e=>setForm(f=>({...f,speed:e.target.value}))}/>
    <div className="hint">0.5倍（ゆっくり）〜 2.0倍（早口）・推奨 1.2〜1.5</div></div>
    <div className="field"><div className="lbl">AIキャラクター設定</div>
    <textarea className="inp" rows={3} value={form.sys} onChange={e=>setForm(f=>({...f,sys:e.target.value}))} style={{resize:"vertical"}}/></div>
    {err&&<div className="err-box">{err}</div>}
    <button className="btn-go" onClick={saveConfig}>設定完了 →</button>
  </div></div></>);

  if(!started) return(<><style>{css}</style><div className="ov">
    <div className="oi">🎙</div><div className="ot">ハンズフリー音声会話</div>
    <div className="od">タップすると起動します。<br/>あとはポケットに入れるだけ。<br/><br/>
    <span style={{color:"#34d399",fontSize:".78rem"}}>✓ VOICEVOX音声対応<br/>✓ 失敗時はブラウザ音声にフォールバック</span></div>
    {err&&<div className="err-box" style={{width:"100%"}}>{err}</div>}
    <button className="ob" onClick={handleStart}>🎤 会話を開始する</button>
    <div style={{fontSize:".72rem",color:"#374151",textAlign:"center"}}>「マイクを許可」を選択してください</div>
  </div></>);

  return(<><style>{css}</style><div className="app"><div className="main">
    <div className="sa">
      <div className={`pr ${mode}`}><span className="pi">{ICONS[mode]}</span></div>
      <div className={`st ${mode}`}>{STXT[mode]}</div>
      <div className="badges">
        <span className={`badge ${wl?"ok":"warn"}`}>{wl?"🔒":"⚠"}</span>
        <span className={`badge ${silOk?"ok":"off"}`}>{silOk?"🔈":"○"}</span>
        <span className={`badge ${bgV?"ok":"warn"}`}>{bgV?"👁":"💤"}</span>
        <span className={`badge ${ttsT==="voicevox"?"ok":ttsT==="browser"?"warn":"off"}`}>
          {ttsT==="voicevox"?"🎤 VOICEVOX":ttsT==="browser"?"📱 ブラウザ":"○ TTS待機"}
        </span>
      </div>
      <div className="vw"><div className="vt"><div className="vf" style={{width:`${vp}%`,background:vol>sens?"#f87171":vol>SPEAK_THR?"#34d399":"#374151"}}/><div className="vh" style={{left:`${tp}%`}}/></div>
      <div className="vl"><span className="vlb">音量</span><span className="vlb">▲割り込み</span></div></div>
    </div>
    <div className="chat">
      {msgs.length===0&&(<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"#1f2937",fontSize:".83rem",textAlign:"center",lineHeight:2,padding:"0 20px"}}>声を出すと自動で録音が始まります<br/><span style={{fontSize:".72rem"}}>VOICEVOX初回は起動に数分かかります</span></div>)}
      {msgs.map((m,i)=>(<div className="row" key={i}><div className="rl">{m.role==="user"?"あなた":"AI"}</div>
        <div className={`bb ${m.role}${m.now?" now":""}${m.cut?" cut":""}`}>{m.thinking?<div className="th"><div className="td"/><div className="td"/><div className="td"/></div>:m.text}</div>
        {m.cut&&<div className="cl">⚡ 割り込み</div>}</div>))}
      <div ref={er}/>
    </div>
    <div className="bot">
      <div className="sr"><span className="sl">割り込み感度</span><input type="range" className="ss" min={8} max={60} value={sens} onChange={e=>setSens(Number(e.target.value))}/><span className="sl" style={{minWidth:26,textAlign:"right"}}>{sens}</span></div>
      <div className="br">
        <button className="bs red" onClick={()=>{setMsgs([]);hr.current=[];}}>クリア</button>
        <button className="bs yel" onClick={()=>{if(ar.current){ar.current.pause();ar.current=null;}window.speechSynthesis.cancel();utr.current=null;setMsgs(m=>m.map(x=>x.now?{...x,now:false}:x));sm("waiting");}}>再生停止</button>
        <button className="bs" onClick={()=>{localStorage.removeItem("hf_vc9");setCfg(null);}}>⚙ 設定</button>
      </div>
      {err&&<div className="err-box" style={{fontSize:".75rem"}}>{err}</div>}
    </div>
  </div></div></>);
}
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
